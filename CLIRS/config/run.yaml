# =============================================================================
# CLIRS configuration reference (human-readable documentation)
# =============================================================================
# The pipeline reads:  CLIRS/config/run.json  (source of truth)
#
# Edit run.json when changing experiments. This file mirrors the effective
# flat settings so you can read and compare without opening nested JSON.
# You may still pass --config CLIRS/config/run.yaml for a flat YAML override.
# =============================================================================

# --- experiment (run.json → experiment) ---
branch_name: main
nb_runs: 30                                                          # FIX - do not change

# --- seeds (run.json → seeds) ---
seed: 42   # data seed: subsample, train/test split, clustering

# --- data (run.json → data) ---
taxonomy_path: "Data - Collection/Final/taxonomy.csv"                # FIX - do not change
mastery_levels_path: "Data - Collection/Final/mastery_levels.json"   # FIX - do not change
cv_path: "Data - Collection/Final/resumes.json"                      # FIX - do not change
job_path: "Data - Collection/Final/jobs.json"                        # FIX - do not change
course_path: "Data - Collection/Final/courses.json"                  # FIX - do not change
level_3: true                                                        # FIX - do not change
max_cv_skills: 15                                                    # FIX - do not change
nb_cvs: -1      # -1 = use all learners after filtering              # FIX - do not change
nb_jobs: 100                                                         # FIX - do not change
nb_courses: 100                                                      # 100 and 500

# --- split (run.json → split) ---
train_ratio: 0.7                                                     # FIX - do not change
test_ratio: 0.3                                                      # FIX - do not change

# --- model (run.json → model) ---
model: dqn                                                           # dqn | ppo  (JSON key: algorithm)
total_steps: 5000000                                                 # FIX - do not change
eval_freq: 5000                                                      # FIX - do not change

# --- environment (run.json → environment) ---
threshold: 0.8                                                       # FIX - do not change
k: 2                                                                 # 2,3,4,5,6

# --- clustering (run.json → clustering) ---
use_clustering: true
n_clusters: 4
auto_clusters: true
max_clusters: 10
# Reward multipliers (run.json → clustering.reward_multipliers)
clustering:
  same_cluster_increase: 1.1
  diff_cluster_increase: 1.3

# --- results (run.json → results) ---
results_path: CLIRS/results
